# cargo-deny policy for memcore.
# See docs/CI_SECURITY.md for how to handle advisories.

[graph]
targets = []
all-features = true
no-default-features = false

[advisories]
version = 2
yanked = "warn"
# Match cargo-audit pragmatism: unmaintained/unsound transitive noise should not fail CI.
unmaintained = "workspace"
unsound = "workspace"
unused-ignored-advisory = "warn"
ignore = [
    # Expiry target: 2026-10-11 — revisit when upgrading sqlx / rsa.
    { id = "RUSTSEC-2023-0071", reason = "Transitive via sqlx-postgres; no fixed rsa release yet (revisit by 2026-10-11)" },
    # Expiry target: 2026-10-11 — LanceDB → object_store → quick-xml; not in default build.
    { id = "RUSTSEC-2026-0194", reason = "Transitive via optional lancedb/object_store; not in default build (revisit by 2026-10-11)" },
    { id = "RUSTSEC-2026-0195", reason = "Transitive via optional lancedb/object_store; not in default build (revisit by 2026-10-11)" },
    # Expiry target: 2026-10-11 — LanceDB → aws → rustls 0.21; default build uses rustls 0.23.
    { id = "RUSTSEC-2026-0098", reason = "Transitive via optional lancedb/aws rustls 0.21 path only (revisit by 2026-10-11)" },
    { id = "RUSTSEC-2026-0099", reason = "Transitive via optional lancedb/aws rustls 0.21 path only (revisit by 2026-10-11)" },
    { id = "RUSTSEC-2026-0104", reason = "Transitive via optional lancedb/aws rustls 0.21 path only (revisit by 2026-10-11)" },
]

[licenses]
version = 2
confidence-threshold = 0.8
# Workspace crates use publish = false; skip their license field.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
