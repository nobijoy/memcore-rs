# Production-shaped Docker Compose: Postgres (facts/events/API keys) + Qdrant (vectors).
# LanceDB is not enabled in this stack.
#
# Override secrets via a `.env` file or environment — do not use placeholder values
# in real deployments.
#
# Build with Postgres + Qdrant support (required for configured backends):
#   docker compose -f docker/docker-compose.prod.yml up --build
#
# Enable OpenAI providers (optional):
#   Set MEMCORE_LLM_PROVIDER=openai, MEMCORE_EMBEDDING_PROVIDER=openai, and OPENAI_API_KEY
#   in a `.env` file or under `memcore.environment` below.
#
# Revert to mock vector backend (optional):
#   build.args.CARGO_FEATURES: "postgres"
#   MEMCORE_VECTOR_BACKEND: mock
#
# Enable Redis context cache (optional, requires redis-cache feature in build):
#   build.args.CARGO_FEATURES: "postgres,qdrant,redis-cache"
#   Uncomment the redis service and memcore env vars below
#
# Enable LanceDB vector backend instead (optional, heavier image build — not recommended here):
#   build.args.CARGO_FEATURES: "postgres,lancedb"
#   MEMCORE_VECTOR_BACKEND: lancedb
#   MEMCORE_LANCEDB_PATH: /app/data/lancedb

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: memcore
      POSTGRES_USER: memcore
      POSTGRES_PASSWORD: memcore_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memcore -d memcore"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # The official Qdrant image does not include curl/wget; health is checked via
    # host: curl http://localhost:6333/healthz (see docs/DEPLOYMENT.md).

  # Optional Redis for shared context cache (disabled by default):
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  memcore:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        CARGO_FEATURES: postgres,qdrant
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      MEMCORE_ENV: production
      MEMCORE_HOST: 0.0.0.0
      MEMCORE_PORT: 8080

      MEMCORE_STORAGE_MODE: production

      MEMCORE_FACT_BACKEND: postgres
      MEMCORE_EVENT_BACKEND: postgres
      MEMCORE_POSTGRES_URL: postgres://memcore:memcore_password@postgres:5432/memcore

      MEMCORE_VECTOR_BACKEND: qdrant
      MEMCORE_QDRANT_URL: http://qdrant:6333
      MEMCORE_QDRANT_COLLECTION: memcore_vectors

      MEMCORE_LLM_PROVIDER: mock
      MEMCORE_LLM_MODEL: mock-llm
      MEMCORE_EMBEDDING_PROVIDER: mock
      MEMCORE_EMBEDDING_MODEL: mock-embedding
      # Optional OpenAI providers (uncomment and set OPENAI_API_KEY):
      # MEMCORE_LLM_PROVIDER: openai
      # MEMCORE_LLM_MODEL: gpt-4.1-mini
      # MEMCORE_EMBEDDING_PROVIDER: openai
      # MEMCORE_EMBEDDING_MODEL: text-embedding-3-small
      # OPENAI_API_KEY: your_key_here

      MEMCORE_AUTH_ENABLED: "true"
      MEMCORE_AUTH_MODE: dev
      MEMCORE_DEV_API_KEY: change_this_dev_key
      MEMCORE_API_KEY_PEPPER: change_this_pepper

      MEMCORE_RATE_LIMIT_ENABLED: "true"
      MEMCORE_RATE_LIMIT_REQUESTS_PER_MINUTE: 120

      MEMCORE_LOG_FORMAT: json
      MEMCORE_LOG_LEVEL: info
      MEMCORE_METRICS_ENABLED: "true"
      # Optional Redis context cache (requires CARGO_FEATURES=redis-cache):
      # MEMCORE_CONTEXT_CACHE_BACKEND: redis
      # MEMCORE_REDIS_URL: redis://redis:6379
      # MEMCORE_CONTEXT_CACHE_TTL_SECONDS: "300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
