# Production-shaped Docker Compose: Postgres (facts/events/API keys) + Qdrant (vectors).
# LanceDB is not enabled in this stack.
#
# Secrets: use an env file with placeholders replaced — never commit real values.
#
#   cp .env.production.example .env.production
#   # edit CHANGE_ME values
#   ./scripts/ops/validate_env.sh .env.production
#   docker compose --env-file .env.production -f docker/docker-compose.prod.yml up --build
#
# Required build features: postgres,qdrant
# Backups: prefer managed Postgres snapshots / pg_dump; protect volumes.
# See docs/DEPLOYMENT.md and docs/runbooks/

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memcore}
      POSTGRES_USER: ${POSTGRES_USER:-memcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-memcore} -d $${POSTGRES_DB:-memcore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # Official image has no curl/wget; check from host: curl http://localhost:6333/healthz

  # Optional Redis for shared context cache (disabled by default):
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  memcore:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        CARGO_FEATURES: postgres,qdrant
        APP_VERSION: ${APP_VERSION:-unknown}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      MEMCORE_ENV: ${MEMCORE_ENV:-production}
      MEMCORE_HOST: 0.0.0.0
      MEMCORE_PORT: 8080

      MEMCORE_STORAGE_MODE: production
      MEMCORE_FACT_BACKEND: postgres
      MEMCORE_EVENT_BACKEND: postgres
      MEMCORE_POSTGRES_URL: ${MEMCORE_POSTGRES_URL:?set MEMCORE_POSTGRES_URL}
      MEMCORE_DATABASE_MIGRATION_MODE: ${MEMCORE_DATABASE_MIGRATION_MODE:-auto}
      MEMCORE_DATABASE_REQUIRE_CLEAN_MIGRATIONS: ${MEMCORE_DATABASE_REQUIRE_CLEAN_MIGRATIONS:-true}

      MEMCORE_VECTOR_BACKEND: qdrant
      MEMCORE_QDRANT_URL: ${MEMCORE_QDRANT_URL:-http://qdrant:6333}
      MEMCORE_QDRANT_COLLECTION: ${MEMCORE_QDRANT_COLLECTION:-memcore_vectors}

      MEMCORE_LLM_PROVIDER: ${MEMCORE_LLM_PROVIDER:-mock}
      MEMCORE_LLM_MODEL: ${MEMCORE_LLM_MODEL:-mock-llm}
      MEMCORE_EMBEDDING_PROVIDER: ${MEMCORE_EMBEDDING_PROVIDER:-mock}
      MEMCORE_EMBEDDING_MODEL: ${MEMCORE_EMBEDDING_MODEL:-mock-embedding}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}

      MEMCORE_AUTH_ENABLED: ${MEMCORE_AUTH_ENABLED:-true}
      MEMCORE_AUTH_MODE: ${MEMCORE_AUTH_MODE:-dev}
      MEMCORE_DEV_API_KEY: ${MEMCORE_DEV_API_KEY:-}
      MEMCORE_API_KEY_PEPPER: ${MEMCORE_API_KEY_PEPPER:-}

      MEMCORE_RATE_LIMIT_ENABLED: ${MEMCORE_RATE_LIMIT_ENABLED:-true}
      MEMCORE_RATE_LIMIT_REQUESTS_PER_MINUTE: ${MEMCORE_RATE_LIMIT_REQUESTS_PER_MINUTE:-120}

      MEMCORE_LOG_FORMAT: ${MEMCORE_LOG_FORMAT:-json}
      MEMCORE_LOG_LEVEL: ${MEMCORE_LOG_LEVEL:-info}
      MEMCORE_METRICS_ENABLED: ${MEMCORE_METRICS_ENABLED:-true}
      MEMCORE_CORS_ENABLED: ${MEMCORE_CORS_ENABLED:-false}
      MEMCORE_SECURITY_HEADERS_ENABLED: ${MEMCORE_SECURITY_HEADERS_ENABLED:-true}
      MEMCORE_GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS: ${MEMCORE_GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS:-30}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
