name: Release

# Manual draft release foundation. Does not publish crates, push images, or sign artifacts.
# See docs/RELEASES.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, e.g. v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark GitHub release as pre-release"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version input
        id: ver
        env:
          VERSION_TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v0.1.0 (optional pre-release suffix allowed)."
            exit 1
          fi
          CARGO_VERSION="${VERSION_TAG#v}"
          # Strip optional pre-release / build metadata for Cargo comparison.
          CARGO_BASE="${CARGO_VERSION%%-*}"
          CARGO_BASE="${CARGO_BASE%%+*}"
          WORKSPACE_VERSION="$(sed -n '/\[workspace.package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml | head -n1)"
          if [[ -z "$WORKSPACE_VERSION" ]]; then
            echo "Could not read [workspace.package] version from Cargo.toml"
            exit 1
          fi
          if [[ "$CARGO_BASE" != "$WORKSPACE_VERSION" ]]; then
            echo "Version mismatch: tag base '$CARGO_BASE' != Cargo.toml workspace version '$WORKSPACE_VERSION'"
            echo "Bump [workspace.package].version before releasing."
            exit 1
          fi
          BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$WORKSPACE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_timestamp=$BUILD_TIMESTAMP" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Release build
        env:
          MEMCORE_BUILD_GIT_SHA: ${{ github.sha }}
          MEMCORE_BUILD_TIMESTAMP: ${{ steps.ver.outputs.build_timestamp }}
          MEMCORE_BUILD_PROFILE: release
        run: cargo build --release -p memcore-api

      - name: Package artifacts
        env:
          VERSION_TAG: ${{ steps.ver.outputs.version_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/memcore-api "dist/memcore-api-linux-x86_64"
          cp README.md dist/README.md
          cp CHANGELOG.md dist/CHANGELOG.md
          (
            cd dist
            sha256sum memcore-api-linux-x86_64 README.md CHANGELOG.md > checksums.txt
          )
          ls -la dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: |
            memcore:${{ steps.ver.outputs.version_tag }}
            memcore:${{ steps.ver.outputs.cargo_version }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.cargo_version }}
            GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.ver.outputs.build_timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (CRITICAL fail)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: memcore:${{ steps.ver.outputs.version_tag }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft "memcore:${{ steps.ver.outputs.version_tag }}" -o spdx-json=dist/sbom.spdx.json
          (cd dist && sha256sum sbom.spdx.json >> checksums.txt)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memcore-release-${{ steps.ver.outputs.version_tag }}
          path: dist/
          retention-days: 30

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ steps.ver.outputs.version_tag }}
          CARGO_VERSION: ${{ steps.ver.outputs.cargo_version }}
          BUILD_TIMESTAMP: ${{ steps.ver.outputs.build_timestamp }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          NOTES="$(mktemp)"
          {
            echo "## memcore ${VERSION_TAG}"
            echo
            echo "- Package version: \`${CARGO_VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build timestamp (UTC): \`${BUILD_TIMESTAMP}\`"
            echo "- Artifacts: Linux x86_64 binary, checksums, SPDX SBOM"
            echo "- Docker image built locally as \`memcore:${VERSION_TAG}\` (not pushed to a registry)"
            echo "- Image scanned with Trivy (CRITICAL fail policy)"
            echo
            echo "### Migration / ops warnings"
            echo
            echo "- Back up databases before applying migrations"
            echo "- Confirm \`/ready\` after deploy"
            echo "- Verify secrets via environment/secret manager (never bake into images)"
            echo "- Review \`CHANGELOG.md\` Unreleased section and move entries under this version"
            echo
            echo "### Not included"
            echo
            echo "- crates.io publish"
            echo "- registry image push"
            echo "- image signing / SLSA provenance"
            echo
            echo "### Checksums"
            echo
            echo '```'
            cat dist/checksums.txt
            echo '```'
          } > "$NOTES"

          PRE_ARGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            PRE_ARGS+=(--prerelease)
          fi

          gh release create "$VERSION_TAG" \
            --draft \
            "${PRE_ARGS[@]}" \
            --title "memcore ${VERSION_TAG}" \
            --notes-file "$NOTES" \
            dist/memcore-api-linux-x86_64 \
            dist/checksums.txt \
            dist/sbom.spdx.json \
            dist/CHANGELOG.md \
            dist/README.md
